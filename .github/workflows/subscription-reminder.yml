name: Subscription reminder

on:
  schedule:
    # Sep 19 08:00 NZST (UTC+12) ≈ Sep 18 20:00 UTC — 7 days before promo ends
    - cron: "0 20 18 9 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post subscription downgrade reminder
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const subs = JSON.parse(fs.readFileSync('docs/subscriptions.json', 'utf8'));

            for (const sub of subs) {
              const title = `[Subscription] Downgrade ${sub.service} by ${sub.downgradeBy}`;
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              });

              const already = issues.find((i) => i.title === title);
              if (already) continue;

              const body = [
                `## Downgrade reminder`,
                '',
                `**${sub.service}** promo ends **${sub.downgradeBy}**.`,
                '',
                `**Action:** Downgrade to **${sub.revertTo}** before the renewal date.`,
                '',
                sub.notes || '',
                '',
                '---',
                'Reply `done` when downgraded.',
                '',
                '_Source: [`docs/SUBSCRIPTIONS.md`](docs/SUBSCRIPTIONS.md)_',
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
