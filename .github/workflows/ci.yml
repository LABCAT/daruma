name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter dashboard exec playwright install --with-deps chromium

      - name: OE workers tests
        run: pnpm test:oe

      - name: Dashboard unit tests
        run: pnpm test:dashboard

      - name: Dashboard production build
        run: pnpm build:dashboard

      - name: E2E (slot — may skip until AG-08)
        run: |
          echo "DASHBOARD_PASSWORD=ci_test_password" > apps/dashboard/.dev.vars
          pnpm test:e2e

      - name: Parity (slot — stub until AG-07)
        run: pnpm test:parity

  changes:
    name: Detect Changes
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      collect: ${{ steps.filter.outputs.collect }}
      score: ${{ steps.filter.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/**'
            orchestrator:
              - 'workers/opportunity-engine/src/orchestrator/**'
              - 'workers/opportunity-engine/src/shared/**'
              - 'workers/opportunity-engine/wrangler.orchestrator.toml'
              - 'packages/**'
            collect:
              - 'workers/opportunity-engine/src/collect/**'
              - 'workers/opportunity-engine/src/shared/**'
              - 'workers/opportunity-engine/wrangler.collect.toml'
              - 'packages/**'
            score:
              - 'workers/opportunity-engine/src/score/**'
              - 'workers/opportunity-engine/src/shared/**'
              - 'workers/opportunity-engine/wrangler.score.toml'
              - 'packages/**'

  deploy-dashboard:
    name: Deploy Dashboard
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Dashboard
        run: pnpm build:dashboard
      - name: Deploy Dashboard to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter dashboard exec wrangler deploy

  deploy-orchestrator:
    name: Deploy Orchestrator
    needs: changes
    if: needs.changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Opportunity Engine (Orchestrator)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter opportunity-engine exec wrangler deploy --config wrangler.orchestrator.toml

  deploy-collect:
    name: Deploy Collect
    needs: changes
    if: needs.changes.outputs.collect == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Opportunity Engine (Collect)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter opportunity-engine exec wrangler deploy --config wrangler.collect.toml

  deploy-score:
    name: Deploy Score
    needs: changes
    if: needs.changes.outputs.score == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deploy Opportunity Engine (Score)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter opportunity-engine exec wrangler deploy --config wrangler.score.toml
