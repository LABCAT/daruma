name: Daruma

on:
  schedule:
    # Mon + Thu 08:00 NZST ≈ Sun/Wed 20:00 UTC
    - cron: "0 20 * * 0"
    - cron: "0 20 * * 3"
    # Tue 08:00 NZST ≈ Mon 20:00 UTC
    - cron: "0 20 * * 1"
    # Subscription: Sep 19 08:00 NZST ≈ Sep 18 20:00 UTC
    - cron: "0 20 18 9 *"
  workflow_dispatch:
    inputs:
      task:
        description: Which job to run (auto = follow NZ calendar)
        type: choice
        options:
          - auto
          - check-in
          - research
          - subscription
        default: auto

permissions:
  contents: read
  issues: write

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scheduled tasks
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const nzNow = new Date(
              new Date().toLocaleString('en-US', { timeZone: 'Pacific/Auckland' })
            );
            const nzDay = nzNow.getDay(); // 0 Sun … 6 Sat
            const cron = context.payload.schedule || '';
            const input = context.payload.inputs?.task || 'auto';

            let runCheckin = false;
            let runResearch = false;
            let runSubscription = false;

            if (context.eventName === 'workflow_dispatch') {
              if (input === 'check-in') runCheckin = true;
              else if (input === 'research') runResearch = true;
              else if (input === 'subscription') runSubscription = true;
              else {
                runCheckin = nzDay === 1 || nzDay === 4;
                runResearch = nzDay === 2;
              }
            } else {
              runCheckin = cron === '0 20 * * 0' || cron === '0 20 * * 3';
              runResearch = cron === '0 20 * * 1';
              runSubscription = cron === '0 20 18 9 *';
            }

            const dayLabel = nzNow.toLocaleDateString('en-NZ', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric',
              timeZone: 'Pacific/Auckland',
            });
            const nzDateKey = nzNow.toLocaleDateString('en-CA', {
              timeZone: 'Pacific/Auckland',
            }); // YYYY-MM-DD

            async function postedCheckinToday(issueNumber) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 20,
              });
              return comments.some((c) => {
                if (!c.body?.includes('Check-in reminder')) return false;
                const created = new Date(c.created_at).toLocaleDateString('en-CA', {
                  timeZone: 'Pacific/Auckland',
                });
                return created === nzDateKey;
              });
            }

            if (runCheckin) {
              const current = fs.readFileSync('docs/CURRENT.md', 'utf8');
              let subscriptionAlerts = '';
              try {
                const subs = JSON.parse(fs.readFileSync('docs/subscriptions.json', 'utf8'));
                const today = new Date(nzDateKey + 'T00:00:00');
                for (const sub of subs) {
                  const deadline = new Date(sub.downgradeBy + 'T00:00:00');
                  const remindFrom = new Date(deadline);
                  remindFrom.setDate(remindFrom.getDate() - (sub.remindDaysBefore || 7));
                  if (today >= remindFrom && today <= deadline) {
                    const daysLeft = Math.ceil((deadline - today) / 86400000);
                    subscriptionAlerts += [
                      `### Subscription reminder: ${sub.service}`,
                      '',
                      `**${daysLeft} day(s)** until downgrade deadline (**${sub.downgradeBy}**).`,
                      `Revert to: **${sub.revertTo}**`,
                      sub.notes ? `\n${sub.notes}` : '',
                      '',
                    ].join('\n');
                  }
                }
              } catch (e) {
                core.warning(`Subscription alerts: ${e.message}`);
              }

              const titlePrefix = '[Check-in]';
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              });
              const existing = issues.find((i) => i.title.startsWith(titlePrefix));

              const body = [
                `## Daruma check-in — ${dayLabel}`,
                '',
                subscriptionAlerts,
                current,
                '',
                '---',
                '**Reply:** `done` · `blocked: …` · `need help`',
                '',
                '_Sources: [`docs/CURRENT.md`](docs/CURRENT.md) · [`docs/SUBSCRIPTIONS.md`](docs/SUBSCRIPTIONS.md)_',
              ].join('\n');

              if (existing) {
                if (await postedCheckinToday(existing.number)) {
                  core.info('Check-in already posted today — skipping');
                } else {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    body: `### Check-in reminder\n\n${body}`,
                  });
                  core.info(`Check-in comment on #${existing.number}`);
                }
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `${titlePrefix} Current focus`,
                  body,
                });
                core.info('Created check-in issue');
              }
            }

            if (runResearch) {
              const queue = JSON.parse(fs.readFileSync('docs/research-queue.json', 'utf8'));
              const { items, pickThreshold, brainstormUrl } = queue;
              const startOfYear = new Date(nzNow.getFullYear(), 0, 1);
              const weekNum = Math.ceil(
                ((nzNow - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7
              );
              const item = items[weekNum % items.length];

              const focus = item.focus || {};
              const toolboxPrompt = [
                'North star: ideas must plausibly contribute to portfolio revenue that funds',
                'always-on Daruma — bias toward audiences that already spend on tools.',
                '',
                'Each time this prompt is run, independently select a fresh combination of:',
                '- Audience: a specific small business type or trade (never repeat a previous one)',
                '- Source: App Store reviews, Play Store reviews, Reddit, Twitter/X, G2/Capterra',
                '- Angle: painful admin tasks | tools they hate but pay for | things still done',
                '  on paper | features missing from popular tools',
                '',
                'State your chosen combination at the top of your response before researching.',
                'Do not repeat an audience or angle combination from earlier in this conversation.',
                'Use live web search and cite sources.',
                '',
                'I am looking for micro problems solvable with a single-purpose app (mobile, web,',
                'or both) shippable as a working v1 in under a week. Discovery is ASO-first —',
                'identify the exact store keyword or SEO term a user would search. Secondary',
                'channels (Reddit, niche forums, direct outreach) are in scope when they add reach.',
                'Revenue models in scope: subscription, one-time purchase, or freemium with a',
                'paid tier. Minimum screens, immediate value, no onboarding required. Not a',
                'platform. Not a suite. A tiny sharp tool that does one thing better than anything else.',
                '',
                'When scoring Build Speed — be strict. Anything requiring complex integrations,',
                'third-party APIs, or more than 3 screens scores 1-2. A smart form, calculator,',
                'or generator with immediate output scores 4-5. Favour the latter.',
                '',
                'When scoring Willingness to pay — be strict. Score whether this audience already',
                'spends money on the problem (existing subscriptions, SaaS, or paid apps). Free-only',
                'niches with no spend signal score 1-2.',
                '',
                '---',
                '',
                "This week's research focus:",
                `- Audience: ${focus.audience || ''}`,
                `- Source: ${focus.source || ''}`,
                `- Angle: ${focus.angle || ''}`,
                '',
                'For each opportunity (3–5 total):',
                '',
                '### [Opportunity name]',
                '- Brand: Toolbox',
                '- One-line hook:',
                '- Target keyword (ASO or SEO):',
                '- Primary discovery channel: [store | search | community | outreach]',
                '- Revenue model: [subscription | one-time | freemium]',
                '- Pain (1–5):',
                '- Willingness to pay (1–5): [existing spend in category]',
                '- Discovery (1–5): [ASO/SEO volume vs competition; secondary channels if any]',
                '- Build speed (1–5): [v1 in under a week = 4-5, anything longer = 1-2]',
                '- Passion (1–5):',
                '- Total /25:',
                '- MVP scope: [one sentence — what is the absolute minimum to ship v1]',
                '- Recommendation: build | research more | skip',
                '',
                'End with: **Top pick:** [name] — [one sentence why]',
              ].join('\n');

              const dojoPrompt = [
                'North star: ideas must plausibly contribute to portfolio revenue that funds',
                'always-on Daruma — bias toward categories with proven IAP, ad, or subscription spend.',
                '',
                'Each time this prompt is run, independently select a fresh combination of:',
                '- Genre: puzzle | arcade | reflex | trivia | word | math | memory | creative',
                '- Platform focus: iOS App Store | Google Play Store | web | cross-platform',
                '- Research source: App Store keyword tools | Play Store categories |',
                '  Reddit (r/iosgaming, r/androidgaming) | AppMagic revenue estimates',
                '',
                'State your chosen combination at the top of your response before researching.',
                'Do not repeat a genre or platform combination from earlier in this conversation.',
                'Use live web search and cite sources.',
                '',
                'I am looking for keyword gaps — search terms with real volume where the top',
                'ranking apps are old, ugly, poorly rated, or bloated. Discovery is ASO-first;',
                'a beautiful, focused alternative could rank quickly with good ASO. Also in scope:',
                'web playable, cross-platform, Product Hunt, Reddit launches.',
                '',
                'The app must be:',
                '- Describable in one sentence',
                '- Completable in under 2 minutes per session',
                '- Shippable as a working v1 in under a week',
                '- Monetisable — default: ads + remove-ads IAP; subscription or premium IAP',
                '  if the category already supports it',
                '',
                'When scoring Build Speed — be strict. A simple game loop with one mechanic',
                'scores 4-5. Anything requiring levels, unlocks, or complex state scores 1-2.',
                '',
                'When scoring Willingness to pay — be strict. Score whether users already spend',
                'in this category (IAP, remove-ads, premium unlocks, subscriptions) and whether',
                'ad revenue density is realistic. Categories with no spend signal score 1-2.',
                '',
                '---',
                '',
                "This week's research focus:",
                `- Genre: ${focus.genre || ''}`,
                `- Platform: ${focus.platform || ''}`,
                `- Source: ${focus.source || ''}`,
                '',
                'For each opportunity (3–5 total):',
                '',
                '### [Opportunity name]',
                '- Brand: Dojo',
                '- One-line hook:',
                '- Target keyword (ASO or web):',
                '- Primary discovery channel: [store | web | community | launch]',
                '- Revenue model: [ads + IAP | subscription | hybrid]',
                '- Competitor weakness: [why the current top app is beatable]',
                '- Pain (1–5):',
                '- Willingness to pay (1–5): [existing spend + ad/IAP potential]',
                '- Discovery (1–5): [keyword volume vs competition; secondary channels if any]',
                '- Build speed (1–5): [v1 in under a week = 4-5, anything longer = 1-2]',
                '- Passion (1–5):',
                '- Total /25:',
                '- MVP scope: [one sentence — what is the absolute minimum to ship v1]',
                '- Recommendation: build | research more | skip',
                '',
                'End with: **Top pick:** [name] — [one sentence why]',
              ].join('\n');

              const pastePrompt = item.brand === 'Toolbox' ? toolboxPrompt : dojoPrompt;

              const weekLabel = `W${String(weekNum).padStart(2, '0')}`;
              const titlePrefix = '[Research]';
              const title = `${titlePrefix} ${weekLabel} · ${item.brand}`;

              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              });
              if (openIssues.find((i) => i.title === title)) {
                core.info('Research issue already exists — skipping');
              } else {
                const body = [
                  `<!-- research-id: ${item.id} -->`,
                  `## Weekly research — ${dayLabel}`,
                  '',
                  `**Brand focus:** ${item.brand}`,
                  `**Source:** ${item.source}`,
                  `**Pick threshold:** ${pickThreshold}/25 in Brainstorm before starting a new build`,
                  '',
                  '### 1. Copy prompt below → paste into any AI chat',
                  '',
                  '```',
                  pastePrompt,
                  '```',
                  '',
                  '### 2. Paste AI output into Brainstorm',
                  '',
                  `[brainstorm.daruma.nz](${brainstormUrl}) — score, rank, and compare with existing ideas.`,
                  '',
                  '### 3. Promote winner',
                  '',
                  `If an idea scores **≥ ${pickThreshold}/25**, add it to [\`tracker/APPS.md\`](tracker/APPS.md) and set [\`docs/CURRENT.md\`](docs/CURRENT.md) next action.`,
                  '',
                  '---',
                  '**Reply:** `done` when ideas are in Brainstorm · `skip: reason` to defer',
                  '',
                  '_Queue: [`docs/research-queue.json`](docs/research-queue.json) · Process: [`docs/RESEARCH.md`](docs/RESEARCH.md)_',
                ].join('\n');

                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
                core.info('Created research issue');
              }
            }

            if (runSubscription) {
              const subs = JSON.parse(fs.readFileSync('docs/subscriptions.json', 'utf8'));
              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              });
              for (const sub of subs) {
                const title = `[Subscription] Downgrade ${sub.service} by ${sub.downgradeBy}`;
                if (openIssues.find((i) => i.title === title)) continue;
                const body = [
                  `## Downgrade reminder`,
                  '',
                  `**${sub.service}** promo ends **${sub.downgradeBy}**.`,
                  '',
                  `**Action:** Downgrade to **${sub.revertTo}** before the renewal date.`,
                  '',
                  sub.notes || '',
                  '',
                  '---',
                  'Reply `done` when downgraded.',
                  '',
                  '_Source: [`docs/SUBSCRIPTIONS.md`](docs/SUBSCRIPTIONS.md)_',
                ].join('\n');
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
                core.info(`Created subscription issue for ${sub.service}`);
              }
            }

            if (!runCheckin && !runResearch && !runSubscription) {
              core.info('No tasks scheduled for this run');
            }
