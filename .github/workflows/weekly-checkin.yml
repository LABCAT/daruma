name: Daruma check-in

on:
  schedule:
    # Mon + Thu 08:00 NZST (UTC+12) ≈ Sun/Wed 20:00 UTC
    - cron: "0 20 * * 0"
    - cron: "0 20 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post check-in from CURRENT.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const current = fs.readFileSync('docs/CURRENT.md', 'utf8');

            let subscriptionAlerts = '';
            try {
              const subs = JSON.parse(fs.readFileSync('docs/subscriptions.json', 'utf8'));
              const today = new Date();
              today.setHours(0, 0, 0, 0);

              for (const sub of subs) {
                const deadline = new Date(sub.downgradeBy + 'T00:00:00');
                const remindFrom = new Date(deadline);
                remindFrom.setDate(remindFrom.getDate() - (sub.remindDaysBefore || 7));
                if (today >= remindFrom && today <= deadline) {
                  const daysLeft = Math.ceil((deadline - today) / 86400000);
                  subscriptionAlerts += [
                    `### Subscription reminder: ${sub.service}`,
                    '',
                    `**${daysLeft} day(s)** until downgrade deadline (**${sub.downgradeBy}**).`,
                    `Revert to: **${sub.revertTo}**`,
                    sub.notes ? `\n${sub.notes}` : '',
                    '',
                  ].join('\n');
                }
              }
            } catch (e) {
              core.warning(`Could not read subscription reminders: ${e.message}`);
            }

            const titlePrefix = '[Check-in]';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const existing = issues.find((i) => i.title.startsWith(titlePrefix));

            const day = new Date().toLocaleDateString('en-NZ', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric',
              timeZone: 'Pacific/Auckland',
            });

            const body = [
              `## Daruma check-in — ${day}`,
              '',
              subscriptionAlerts,
              current,
              '',
              '---',
              '**Reply:** `done` · `blocked: …` · `need help`',
              '',
              '_Sources: [`docs/CURRENT.md`](docs/CURRENT.md) · [`docs/SUBSCRIPTIONS.md`](docs/SUBSCRIPTIONS.md)_',
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `### Check-in reminder\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titlePrefix} Current focus`,
                body,
              });
            }
