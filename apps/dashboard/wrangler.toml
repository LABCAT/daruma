name = "daruma"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

[env.production]
routes = [
  { pattern = "daruma.labcat.nz", custom_domain = true }
]

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "daruma-opportunity-engine"
database_id = "d88e075e-97cc-4543-adb5-b279099fe7ef"
migrations_dir = "../../packages/db-opportunity-engine/migrations"

[[services]]
binding = "ORCHESTRATOR"
service = "daruma-opportunity-engine-orchestrator"

[[d1_databases]]
binding = "DB_CHAT"
database_name = "daruma-chat"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../../packages/db-chat/migrations"
